version: '3.8'

services:
  db:
    image: postgres:15
    container_name: my_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: My1Hard2Guess3Password4
      POSTGRES_DB: prayer_app_database
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - my_network

  web:
    build: .
    container_name: my_flask_app
    environment:
      - SQLALCHEMY_DATABASE_URI=postgresql://postgres:My1Hard2Guess3Password4@db:5432/prayer_app_database
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - my_network

  nginx:
    image: nginx:latest
    ports:
      - "80:80"  # Map port 80 on the host to port 80 in the container
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf  # Map your custom Nginx configuration file
    depends_on:
      - web  # Ensure that the web service is up before starting Nginx
    networks:
      - my_network

volumes:
  postgres_data:

networks:
  my_network:
    driver: bridge

