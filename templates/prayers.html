{% extends 'base.html' %}

{% block title %}Prayers{% endblock %}

{% block content %}
    <h1>Prayers</h1>
    
    <table class="prayer-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Tag</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td colspan="5">
                    <button onclick="toggleAddPrayerForm()">Add Prayer</button>
                </td>
            </tr>
            <!-- Form for adding a new prayer -->
            <tr id="addPrayerForm" style="display: none;">
                <td><input type="text" id="newPrayerTitle" name="newPrayerTitle"></td>
                <td><textarea id="newPrayerDescription" name="newPrayerDescription"></textarea></td>
                <td>
                    <select name="category">
                        {% for category in categories %}
                            <option value="{{ category }}">{{ category }}</option>
                        {% endfor %}
                    </select>
                </td>
                <td><button type="button" onclick="addPrayer(event)">Submit</button></td>
            </tr>

            {% for prayer in prayers %}
            <tr>
                <td>{{ prayer.title }}</td>
                <td>{{ prayer.description }}</td>
                <td>{{ prayer.tag }}</td>
                <td>{{ "Answered" if prayer.answered else "Pending" }}</td>
                <td>
                    <!-- Button to mark prayer as answered -->
                    <form action="{% if prayer.answered %}{{ url_for('mark_pending', prayer_id=prayer.id) }}{% else %}{{ url_for('mark_answered', prayer_id=prayer.id) }}{% endif %}" method="POST" style="display:inline;">
                        <button type="submit">{% if prayer.answered %}Mark as Answered{% else %}Mark as <Pending>% endif %</Pending></button>
                    </form>
                    <!-- Button to mark prayer as archived -->
                    <form action="{{ url_for('mark_archived', prayer_id=prayer.id) }}" method="POST" style="display: inline;">
                        <button type="submit">Archive</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

    <script>
        function toggleAddPrayerForm() {
            var formRow = document.getElementById('addPrayerForm');
            formRow.style.display = formRow.style.display === 'none' ? 'table-row' : 'none';
        }
        function addPrayer(event) {
            //Prevent the default form submission behavior
            event.preventDefault();

            var title = document.getElementById('newPrayerTitle').value;
            var description = document.getElementById('newPrayerDescription').value;

            // Create a new FormData object to send the form data
            var formData = new FormData();
            formData.append('title', title);
            formData.append('description', description);

            //Log the values of title and description to the console
            console.log('Title:', title);
            console.log('Description:', description);

            // Send a POST request to the server using AJAX
            var xhr = new XMLHttpRequest();
            xhr.open('POST', '/add_prayer', true);

            xhr.onload = function () {
                if (xhr.status === 200) {
                    window.location.reload();
                } else {
                    console.error('Failed to add prayer. Status: ' + xhr.status);
                }
            };
            
            xhr.onerror = function () {
                console.error('Failed to send request.');
            };

            xhr.send(formData);
        }
    </script>

{% endblock %}
