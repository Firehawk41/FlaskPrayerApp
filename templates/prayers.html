{% extends 'base.html' %}

{% block title %}Prayers{% endblock %}

{% block content %}
    <h1>Prayers</h1>
    
    <table class="prayer-table">
        <thead>
            <tr>
                <th>Title</th>
                <th>Description</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody>
            {% for prayer in prayers %}
            <tr>
                <td>{{ prayer.title }}</td>
                <td>{{ prayer.description }}</td>
                <td>Answered: {{ "Answered" if prayer.answered else "Pending" }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

{% endblock %}
