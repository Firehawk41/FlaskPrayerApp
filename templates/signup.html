{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
    <h1>Sign Up</h1>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}
    <form action="/signup" class="web-form" method="post" onsubmit="validatePassword()">
        <label for="firstname">First Name:</label>
        <input type="text" id="firstname" name="firstname" required><br>

        <label for="lastname">Last Name:</label>
        <input type="text" id="lastname" name="lastname" required><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required><br>

        <label for="password1">Password:</label>
        <input type="password" id="password1" name="password1" required><br>

        <label for="password2">Confirm Password:</label>
        <input type="password" id="password2" name="password2" required oninput="validatePassword()"><br>
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="submit" value="Sign Up">
    </form>
{% endblock %}

{% block scripts %}
    <script>
        function validatePassword() {
            var password1 = document.getElementById("password1").value;
            var password2 = document.getElementById("password2").value;
            if (password1 !== password2) {
                document.getElementById("password2").setCustomValidity("Passwords do not match");
            } else {
                document.getElementById("password2").setCustomValidity("");
            }
        }
    </script>
{% endblock %}
