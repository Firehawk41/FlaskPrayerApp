{% extends 'base.html' %}

{% block title %}Add New Prayer{% endblock %}

{% block content %}
    <h1>Add New Prayer</h1>
    <form method="POST">
        <label for="title">Title:</label>
        <input type="text" id="title" name="title" required>
        <br>
        <label for="description">Description:</label>
        <input type="text" id="description" name="description" required>
        <br>
        <div class="form-group" style="display: inline;">
            <label for="reminderDays">Reminder Days:</label><br>
            {% for day in days_of_week %}
                <label class="checkbox-inline">
                    <input type="checkbox" id="{{ day }}" name="reminderDays" value="{{ day }}"checked>
                    {{ day|capitalize }}
                </label>
            {% endfor %}
        </div>
        <br>
        <br>
        <label for="tag">Tag:</label>
        <select id="tag" name="tag">
            {% for category in categories %}    
                <option>
                    {{ category }}
                </option>
            {% endfor %}
        </select>    
        <br>
        <br>
        <label for="sharable">Share with friends?</label>
        <select id="sharable" name="sharable">
            <option value="private"selected>Private</option>
            <option value="shared">Shared</option>
        </select>
        <br>
        <br>

        <button type="submit">Save Prayer</button>
        <a href="javascript:history.go(-1);" class="form-btn">Cancel</a>
        
    </form>

{% endblock %}
